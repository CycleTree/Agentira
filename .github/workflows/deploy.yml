name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install trunk
        run: cargo install trunk --locked || true
      
      - name: Build WASM
        run: trunk build --release --public-url /Agentira/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      
      - name: Notify Discord on build failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "content": "🚨 **<@1078639209167990814> CI Build Failed!** 🚨\n❌ **Repository:** `${{ github.repository }}`\n🔧 **Workflow:** `${{ github.workflow }}`\n📋 **Job:** `Build WASM`\n🌟 **Branch:** `${{ github.ref_name }}`\n🔗 **Details:** <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
            }'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Notify Discord on deploy failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "content": "🚨 **<@1078639209167990814> Deployment Failed!** 🚨\n❌ **Repository:** `${{ github.repository }}`\n🔧 **Workflow:** `${{ github.workflow }}`\n📋 **Job:** `Deploy to GitHub Pages`\n🌟 **Branch:** `${{ github.ref_name }}`\n🔗 **Details:** <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
            }'
      
      - name: Notify Discord on success
        if: success()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "content": "✅ **<@1078639209167990814> Deployment Successful!** 🎉\n🚀 **Repository:** `${{ github.repository }}`\n🔧 **Workflow:** `${{ github.workflow }}`\n🌟 **Branch:** `${{ github.ref_name }}`\n🎮 **Live Demo:** https://cycletree.github.io/Agentira/"
            }'
